; Garmin GI260 Popout config
; Ladder is driven by a speed/Vso lift-reserve proxy plus sim/cockpit2/annunciators/stall_warning_ratio, not raw AOA angle.
; AOA angle datarefs are displayed for debugging only because parked/static aircraft can report wrapped alpha.
; Display units are calibrated, not raw degrees:
; - (weight-adjusted Vso / IAS)^2 maps 1.3 x Vso to the top green bar.
; - while weight-on-wheels is true, the speed/Vso proxy is scaled by actual aero lift support
;   from sim/flightmodel/forces/fnrml_aero and sim/flightmodel/forces/fnrml_gear.
; - stall_warning_ratio maps to normalized display units and can override the speed proxy near stall.
; - stall warning alpha / stall_warning_ratio maps to lower red.
; The green circle is separate from the 10 ladder elements. With green_circle_aoa_deg = 0,
; it lights at the first green bar; the green bars then climb to meet it at Approach AOA.
; Before the first arm_ias_kts crossing, normal AOA annunciators are suppressed without FAIL.
; Once armed, the visual ladder stays latched so stall annunciation is not lost below 50 KIAS.
; Small/negative parked-wind IAS is clamped to 0 for arming and does not cause FAIL.
; Required X-Plane values are self-checked at runtime. Invalid Vso, mass, stall ratio,
; or impossible flap ratio latches fail mode with alternating red chevrons.

[DataRefs]
; THIS DATAREF BELOW CONTROLS THE POWER TO THE MODULE:
power_dataref = sim/cockpit2/switches/avionics_power_on
; THIS DATAREF BELOW CONTROLS NIGHTTIME BACKGROUND/LED/BUTTON DIMMING:
night_lighting_dataref = sim/graphics/scenery/percent_lights_on
night_background_lit_blend_max = 1.00 ; Background_LIT.png alpha when night_lighting_dataref = 1
night_led_black_mask_max = 0.30 ; LED texture black mask alpha when night_lighting_dataref = 1
night_button_black_mask_max = 0.15 ; pressed button black mask alpha when night_lighting_dataref = 1

[System]
initial_status = 0 ; legacy popup initial visibility; keep 0 for 3D-only installs
enable_popup = 0 ; 1 = create draggable GI260 popup window, 0 = 3D cockpit device only
arm_ias_kts = 50.0 ; Garmin manual arming speed, 0 disables IAS arming gate
force_warning_on_stall_warning = true ; stall warning biases smoothing target
audio_arm_delay_seconds = 15.0 ; delay audio after arming
audio_startup_delay_seconds = 15.0 ; delay audio after powered startup
audio_gain = 1.49 ; plugin gain before sim/operation/sound/radio_volume_ratio master
slow_beep_repeat_gap_seconds = 0.60 ; upper yellow chevron repeat gap after Beep.wav finishes
fast_beep_repeat_gap_seconds = 0.0 ; red warning repeats Beep.wav back-to-back after it finishes
fail_beep_repeat_gap_seconds = 0.55 ; fail-mode repeat gap after Beep.wav finishes
event_beep_gap_seconds = 0.18 ; gap between multi-beep event plays
mute_minimum_seconds = 15.0 ; manual mute minimum duration
aoa_smoothing_seconds = 0.15 ; AOA smoothing, 0 disables
power_up_rise_seconds = 1.0 ; bottom-to-top cumulative startup sweep
power_up_fall_seconds = 0.5 ; top-to-bottom startup sweep clear
self_test_seconds = 3.0 ; test button all-on time
unpowered_test_long_press_seconds = 0.5 ; hold TEST this long without power to play three quick beeps

[AircraftReference]
aircraft_vso_kts = 0.0 ; fallback/debug only
aircraft_warning_aoa_deg = 10.0 ; fallback if sim/aircraft/overflow/acf_stall_warn_alpha is unavailable
normalized_zero_aoa_deg = 0.0 ; raw AOA degrees mapped to 0 normalized units
approach_speed_vso_multiplier = 1.3 ; Vref target from actual gross weight corrected Vso

[Calibration]
module_hysteresis_deg = 0.2 ; normalized-unit hysteresis; off threshold is on threshold minus this
green_solid_lower_aoa_deg = 1.0 ; ladder 1/10
green_solid_middle_aoa_deg = 2.0 ; ladder 2/10
green_solid_upper_aoa_deg = 3.0 ; ladder 3/10
green_circle_aoa_deg = 0.0 ; 0 = light dot at the first green bar threshold
green_split_bar_aoa_deg = 4.0 ; ladder 4/10
yellow_solid_bar_aoa_deg = 5.0 ; ladder 5/10
yellow_split_bar_aoa_deg = 6.0 ; ladder 6/10
yellow_lower_chevron_aoa_deg = 7.0 ; ladder 7/10
yellow_upper_chevron_aoa_deg = 8.0 ; ladder 8/10
red_lower_aoa_deg = 9.0 ; ladder 9/10
red_upper_aoa_deg = 10.0 ; ladder 10/10
